services:
  - type: web
    name: verdant-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_AGENT_ID
        sync: false
      - key: RETELL_FROM_NUMBER
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_BASE_URL
        value: https://api.moonshot.cn/v1
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://verdantai.xyz
      - key: DB_PATH
        value: /var/render/verdant.db
